<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HRN Client — Settings</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@700&display=swap"
        />

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body,
            html {
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                font-family: "Inter", sans-serif;
                background: #000;
                color: #ffffff;
                user-select: none;
                -webkit-user-select: none;
            }
            .bg-overlay {
                position: fixed;
                inset: 0;
                z-index: 0;
                background: url("https://wallpapercave.com/wp/wp2940308.png")
                    center/cover no-repeat;
            }
            .settings-ui {
                width: 80vw;
                height: 80vh;
                position: fixed;
                z-index: 20;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 1.5rem;
                border: 1px solid rgba(255, 255, 255, 0.15);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            }
            .settings-overlay {
                background: rgba(10, 14, 23, 0.88);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                height: 100%;
                width: 100%;
                display: flex;
                flex-direction: column;
            }
            .header {
                padding: 25px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .header h1 {
                font-family: "Rajdhani", sans-serif;
                color: #40a9ff;
                font-size: 28px;
            }
            .close-btn {
                cursor: pointer;
                font-size: 32px;
                color: rgba(255, 255, 255, 0.5);
                transition: color 0.2s;
                text-decoration: none;
                line-height: 1;
            }
            .close-btn:hover {
                color: rgba(255, 255, 255, 0.9);
            }
            .tabs {
                display: flex;
                gap: 25px;
                padding: 10px 25px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                font-weight: 500;
            }
            .tabs span {
                cursor: pointer;
                opacity: 0.5;
                transition: 0.2s;
                padding-bottom: 5px;
            }
            .tabs span:hover {
                opacity: 0.8;
            }
            .tabs span.selected {
                opacity: 1;
                color: #40a9ff;
                border-bottom: 2px solid #40a9ff;
            }
            .content {
                padding: 25px;
                flex: 1;
                overflow-y: auto;
                color: #efefef;
                line-height: 1.6;
            }
            .setting-item {
                margin-bottom: 25px;
            }
            .setting-item label {
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                color: rgba(255, 255, 255, 0.7);
            }
            .input-box {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                padding: 12px;
                border-radius: 8px;
                width: 100%;
                outline: none;
                font-family: "Inter", sans-serif;
                font-size: 14px;
                transition: border-color 0.2s;
            }
            .input-box:focus {
                border-color: #40a9ff;
            }
            .btn-blue {
                background: #0071e3;
                color: white;
                border: none;
                padding: 12px 20px;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: 0.2s;
                font-family: "Inter", sans-serif;
                font-size: 14px;
            }
            .btn-blue:hover {
                background: #007af5;
            }
            .hidden {
                display: none;
            }
            .back-link {
                position: fixed;
                bottom: 25px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 30;
                color: rgba(255, 255, 255, 0.4);
                text-decoration: none;
                font-size: 13px;
                transition: color 0.2s;
            }
            .back-link:hover {
                color: rgba(255, 255, 255, 0.8);
            }
        </style>
    </head>
    <body>
        <div class="bg-overlay"></div>

        <div class="settings-ui">
            <div class="settings-overlay">
                <div class="header">
                    <div class="header-left">
                        <img
                            src="https://avatars.githubusercontent.com/u/116328501"
                            style="width: 45px; border-radius: 8px"
                            loading="lazy"
                        />
                        <h1>HRN Client</h1>
                    </div>
                    <a href="/" class="close-btn" title="Back to game"
                        >&times;</a
                    >
                </div>
                <div class="tabs">
                    <span class="selected" id="tab_settings_btn">Settings</span>
                    <span id="tab_about_btn">About</span>
                </div>
                <div class="content" id="panel_settings">
                    <div class="setting-item">
                        <label>Wisp Relay Server</label>
                        <input
                            class="input-box"
                            id="wisp_url"
                            placeholder="wss://us-east.wisp.q13x.com/"
                        />
                    </div>
                    <div style="display: flex; gap: 10px">
                        <button class="btn-blue" id="addbutton">
                            Login Microsoft
                        </button>
                    </div>
                </div>
                <div class="content hidden" id="panel_about">
                    <p><strong>HRN Engine</strong> v1.8.8-wasm</p>
                    <p style="margin-top: 10px">
                        Renderer Quality:
                        <span style="color: #40a9ff" id="quality-display"
                            >0.8x</span
                        >
                    </p>
                    <p style="font-size: 13px; opacity: 0.6; margin-top: 20px">
                        Gebruik de URL parameter <b>?q=waarde</b> op de
                        hoofdpagina om de scherpte aan te passen.
                    </p>
                </div>
            </div>
        </div>

        <a href="/" class="back-link">← Back to game</a>

        <script>
            (function () {
                // Tab switching
                var tabSettings = document.getElementById("tab_settings_btn");
                var tabAbout = document.getElementById("tab_about_btn");
                var panelSettings = document.getElementById("panel_settings");
                var panelAbout = document.getElementById("panel_about");

                tabAbout.addEventListener("click", function () {
                    panelSettings.classList.add("hidden");
                    panelAbout.classList.remove("hidden");
                    tabSettings.classList.remove("selected");
                    tabAbout.classList.add("selected");
                });

                tabSettings.addEventListener("click", function () {
                    panelAbout.classList.add("hidden");
                    panelSettings.classList.remove("hidden");
                    tabAbout.classList.remove("selected");
                    tabSettings.classList.add("selected");
                });

                // Load wisp URL from localStorage if saved
                var wispInput = document.getElementById("wisp_url");
                var savedWisp = localStorage.getItem("hrn-wisp-url");
                if (savedWisp) wispInput.value = savedWisp;
                wispInput.addEventListener("change", function () {
                    localStorage.setItem("hrn-wisp-url", wispInput.value);
                });
            })();
        </script>
    </body>
</html>
